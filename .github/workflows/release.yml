name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          TAG=${GITHUB_REF_NAME#v}
          ZIP_NAME="emcp-tools-$TAG.zip"
          DIR_NAME="emcp-tools"
          mkdir -p "release-build/$DIR_NAME"

          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.gitmodules' \
            --exclude='.claude/' \
            --exclude='.commandcode/' \
            --exclude='.vscode/' \
            --exclude='docs/' \
            --exclude='tests/' \
            --exclude='tools/' \
            --exclude='skills/' \
            --exclude='vendor/' \
            --exclude='pro/' \
            --exclude='releases/' \
            --exclude='release-build/' \
            --exclude='*.md' \
            --exclude='CLAUDE.md' \
            --exclude='composer.lock' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            ./ "release-build/$DIR_NAME/"

          cd release-build
          zip -r "../$ZIP_NAME" "$DIR_NAME/"
          cd ..
          rm -rf release-build
          echo "ZIP=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Automated release of EMCP Tools fork with WooCommerce MCP adapter fix.

            Changes from upstream:
            - Fixed `class-mcp-adapter-bootstrap.php`: uses `defined('WP_MCP_VERSION')` instead of `class_exists()` to detect standalone adapter
            - Added `prepend=true` to autoloader registration so EMCP's loader wins over WooCommerce's vendored adapter
          files: ${{ env.ZIP }}
          draft: true
